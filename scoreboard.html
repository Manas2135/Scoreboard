<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorecard</title>
    <link rel="stylesheet" href="scoreboard.css">
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"> -->
</head>

<body>

    <nav>
        <h1 id="h1"> <span id="dot1">•</span> SCOREBOARD <span id="dot2">•</span></h1>
        <img src="gg.jpg" alt="Scorecrd Image">
        <div>
            <span id="span1">0</span> <span id="to">-</span> <span id="span2">0</span> <br>
        </div>

        <form action="" id="fill">
            <label for="gameSelect" id="write">SELECT GAME OR CUSTOM SCORE:</label> <br>
            <select id="gameSelect" name="game">
                <option value="custom">Custom Win Score</option>
                <option value="badminton">Badminton (21)</option>
                <option value="tt">Table Tennis (11)</option>
                <option value="volleyball">Volleyball (25)</option>
            </select>
            <input type="number" id="pick" name="some" placeholder="Custom...">
            <button id="submit">Set</button>
            <br><br>
        </form>
        <button id="person1">+1 PLAYER1</button> <button id="person2">+1 PLAYER2</button>
        <button id="reset"> RESET</button>



    </nav>

    <script src="scoreboard.js"></script>
</body>

</html>
